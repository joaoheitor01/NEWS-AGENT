<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tech News Agent</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Work+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "surface-container-high": "#2a2932",
                    "secondary-container": "#474649",
                    "on-primary-fixed": "#120068",
                    "outline": "#918fa0",
                    "primary-fixed": "#e3dfff",
                    "on-secondary-container": "#b7b4b7",
                    "surface-container": "#1f1f27",
                    "tertiary-container": "#cf7e12",
                    "surface-tint": "#c4c0ff",
                    "surface-bright": "#393841",
                    "inverse-primary": "#5348d4",
                    "outline-variant": "#474554",
                    "on-primary-container": "#1d0090",
                    "inverse-surface": "#e5e1ed",
                    "error": "#ffb4ab",
                    "secondary": "#c8c6c8",
                    "tertiary": "#ffb86f",
                    "secondary-fixed-dim": "#c8c6c8",
                    "on-error": "#690005",
                    "tertiary-fixed-dim": "#ffb86f",
                    "primary-fixed-dim": "#c4c0ff",
                    "on-tertiary-container": "#402300",
                    "surface-variant": "#35343d",
                    "on-background": "#e5e1ed",
                    "primary": "#c4c0ff",
                    "on-tertiary": "#4a2800",
                    "on-surface-variant": "#c8c4d7",
                    "tertiary-fixed": "#ffdcbe",
                    "surface-container-low": "#1b1b23",
                    "on-surface": "#e5e1ed",
                    "background": "#13121b",
                    "on-primary-fixed-variant": "#3b2bbc",
                    "surface-dim": "#13121b",
                    "secondary-fixed": "#e4e2e4",
                    "on-secondary-fixed-variant": "#474649",
                    "on-error-container": "#ffdad6",
                    "on-tertiary-fixed": "#2c1600",
                    "on-tertiary-fixed-variant": "#693c00",
                    "surface-container-lowest": "#0e0d15",
                    "on-secondary": "#303032",
                    "primary-container": "#8881ff",
                    "error-container": "#93000a",
                    "on-secondary-fixed": "#1b1b1d",
                    "surface-container-highest": "#35343d",
                    "surface": "#13121b",
                    "inverse-on-surface": "#302f38",
                    "on-primary": "#2200a3"
                },
                "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
                },
                "spacing": {
                    "xs": "8px",
                    "lg": "40px",
                    "md": "24px",
                    "gutter": "20px",
                    "base": "4px",
                    "xl": "64px",
                    "sm": "16px",
                    "margin": "24px"
                },
                "fontFamily": {
                    "headline-md": ["Space Grotesk"],
                    "body-sm": ["Work Sans"],
                    "body-md": ["Work Sans"],
                    "label-caps": ["Work Sans"],
                    "body-lg": ["Work Sans"],
                    "headline-xl": ["Space Grotesk"],
                    "headline-lg": ["Space Grotesk"]
                },
                "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "500"}],
                    "body-sm": ["14px", {"lineHeight": "1.4", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                }
            }
        }
      }
    </script>
    <style>
      body {
          background-color: #0a0a0c;
          background-image: 
              linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
          background-size: 32px 32px;
          font-family: 'Space Grotesk', sans-serif;
      }
      .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .blinking-cursor-animation {
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body class="bg-background text-on-background min-h-screen font-body-md selection:bg-primary-container selection:text-on-primary-container overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
